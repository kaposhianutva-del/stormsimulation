<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Erosion & Sediment Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }
header { background:#2c3e50; color:white; padding:1rem; text-align:center; }

.container { display:flex; flex-wrap:wrap; padding:10px; }
.panel { flex:1; min-width:300px; background:white; margin:10px; padding:12px; border-radius:8px; }

canvas { border:1px solid #ccc; background:#cfefff; }

button { width:100%; padding:10px; margin-top:10px; }

table { width:100%; border-collapse:collapse; margin-top:10px; }
td, th { border:1px solid #ccc; padding:5px; text-align:center; }

.control-group { margin-bottom:10px; }
</style>
</head>

<body>

<header>
<h2>🌊 Erosion & Sediment Transport Simulator</h2>
</header>

<div class="container">

<!-- CONTROLS -->
<div class="panel">
<h3>Controls</h3>

<div class="control-group">
<label>Slope: <span id="slopeVal">2.5%</span></label>
<input type="range" id="slope" min="0" max="5" step="0.1" value="2.5"
oninput="updateTerrain(); updateLabels();">
</div>

<div class="control-group">
<label>Water Flow: <span id="waterVal">50%</span></label>
<input type="range" id="water" min="0" max="100" value="50"
oninput="updateLabels()">
</div>

<div class="control-group">
<label>Vegetation: <span id="vegVal">40%</span></label>
<input type="range" id="veg" min="0" max="100" value="40"
oninput="updateTerrain(); updateLabels();">
</div>

<label>Ground Type</label>
<select id="ground" onchange="updateTerrain()">
<option value="sand">Sand</option>
<option value="soil" selected>Soil</option>
<option value="rock">Rock</option>
</select>

<button onclick="runStorm()">🌧 Run Storm</button>
<button onclick="resetSim()">🔄 Reset</button>
</div>

<!-- LANDSCAPE -->
<div class="panel">
<h3>Landscape</h3>
<canvas id="land" width="500" height="250"></canvas>
</div>

<!-- GRAPH -->
<div class="panel">
<h3>Graph</h3>
<canvas id="chart"></canvas>
</div>

<!-- TABLE -->
<div class="panel">
<h3>Data Table</h3>
<table>
<thead>
<tr>
<th>Year</th>
<th>Erosion</th>
<th>Deposition</th>
<th>Avg Height</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>

// -------------------- STATE --------------------
let land = [];
let sediment = [];
let flowMap = [];
const W = 60;
let year = 0;

let labels = [];
let erosionData = [];
let depositionData = [];
let heightData = [];

let chart;
let animationRunning = false;

// -------------------- INIT --------------------
function initLand() {

    land = [];
    sediment = [];
    flowMap = new Array(W).fill(0);

    const slope = document.getElementById("slope").value / 100;
    let base = 180;

    for (let i = 0; i < W; i++) {
        land.push(base - i * slope * 80);
        sediment.push(0);
    }
}

// -------------------- UI --------------------
function updateLabels() {
    slopeVal.innerText = slope.value + "%";
    waterVal.innerText = water.value + "%";
    vegVal.innerText = veg.value + "%";
}

// -------------------- DRAW --------------------
function drawLand(particles = []) {

    const c = document.getElementById("land");
    const ctx = c.getContext("2d");

    ctx.clearRect(0,0,c.width,c.height);

    const ground = document.getElementById("ground").value;
    let color = ground==="sand"?"#d8c27a":ground==="rock"?"#666":"#8B5A2B";

    ctx.beginPath();
    ctx.moveTo(0,c.height);

    for(let i=0;i<W;i++){
        ctx.lineTo(i*(c.width/W), c.height-land[i]);
    }

    ctx.lineTo(c.width,c.height);
    ctx.fillStyle=color;
    ctx.fill();

    // sediment visualization (blue = deposition)
    for(let i=0;i<W;i++){
        if(sediment[i] > 1){
            ctx.fillStyle="rgba(0,80,200,0.4)";
            ctx.fillRect(i*(c.width/W), c.height-land[i]-2, 6, 4);
        }
    }

    // river memory
    for(let i=0;i<W;i++){
        if(flowMap[i] > 1){
            ctx.fillStyle="rgba(0,120,255,0.3)";
            ctx.fillRect(i*(c.width/W), c.height-land[i]-2, 6, 4);
        }
    }

    // water particles
    ctx.fillStyle="rgba(0,120,255,0.6)";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,3,0,Math.PI*2);
        ctx.fill();
    });
}

// -------------------- TERRAIN SLOPE --------------------
function computeSlopeAt(i){
    if(i<=0 || i>=W-1) return 0;

    let left = land[i-1];
    let right = land[i+1];

    if(isNaN(left) || isNaN(right)) return 0;

    return (left - right) / 2;
}

// -------------------- WATER FLOW --------------------
function animateWater(callback){

    let particles=[];
    for(let i=0;i<40;i++){
        particles.push({x:Math.random()*500,y:30});
    }

    let frames=0;

    function step(){

        if(!animationRunning) return;

        frames++;

        particles.forEach(p=>{

            let idx=Math.floor((p.x/500)*W);
            if(idx>=W) idx=W-1;

            let slopeForce = computeSlopeAt(idx) * 0.05;

            p.x += 2 + Math.max(0, slopeForce);

            let target=250-land[idx];
            p.y += (target-p.y)*0.3;

            flowMap[idx] += 0.5;
        });

        drawLand(particles);

        if(frames<60){
            requestAnimationFrame(step);
        } else {
            for(let i=0;i<W;i++){
                flowMap[i] *= 0.9;
            }
            callback();
        }
    }

    step();
}

// -------------------- EROSION + SEDIMENT TRACKING --------------------
function simulateErosion(){

    let erosion=0;
    let deposition=0;

    const water = document.getElementById("water").value/100;
    const veg = document.getElementById("veg").value/100;
    const ground = document.getElementById("ground").value;

    let groundFactor =
        ground==="sand"?1.7:
        ground==="rock"?0.25:1;

    let newLand=[...land];
    let newSediment=[...sediment];

    for(let i=1;i<W;i++){

        let slope = computeSlopeAt(i);

        let baseErosion = 0.015 * water * (1-veg);

        let slopeErosion = slope * water * groundFactor * 0.08;

        let flowBoost = 1 + flowMap[i]*0.05;

        let move = (Math.abs(slopeErosion) * flowBoost) + baseErosion;

        move = Math.min(move, 0.8);

        // erosion removes land + adds sediment to system
        newLand[i-1] -= move;
        newSediment[i-1] -= move;

        // deposition moves sediment locally
        newLand[i] += move * 0.7;
        newSediment[i] += move * 0.7;

        erosion += move;
        deposition += move * 0.5;
    }

    land = newLand;
    sediment = newSediment;

    relaxSlopes();

    return {erosion,deposition};
}

// -------------------- SLOPE RELAXATION --------------------
function relaxSlopes(){

    let smoothed=[...land];

    for(let i=1;i<W-1;i++){
        let avg=(land[i-1]+land[i]+land[i+1])/3;
        smoothed[i]=land[i]*0.8 + avg*0.2;
    }

    land=smoothed;
}

// -------------------- RUN --------------------
function runStorm(){

    if(animationRunning) return;

    animationRunning=true;

    animateWater(()=>{

        const result=simulateErosion();

        year++;

        let avg=land.reduce((a,b)=>a+b,0)/W;

        labels.push("Y"+year);
        erosionData.push(result.erosion);
        depositionData.push(result.deposition);
        heightData.push(avg);

        updateChart();
        updateTable();
        drawLand();

        animationRunning=false;
    });
}

// -------------------- GRAPH --------------------
function updateChart(){

    if(!chart){
        chart=new Chart(document.getElementById("chart"),{
            type:"line",
            data:{
                labels,
                datasets:[
                    {label:"Erosion",data:erosionData},
                    {label:"Deposition",data:depositionData},
                    {label:"Avg Height",data:heightData}
                ]
            }
        });
    } else chart.update();
}

// -------------------- TABLE --------------------
function updateTable(){

    const tbody=document.getElementById("tableBody");
    tbody.innerHTML="";

    for(let i=0;i<labels.length;i++){
        tbody.innerHTML+=`
        <tr>
        <td>${labels[i]}</td>
        <td>${erosionData[i].toFixed(2)}</td>
        <td>${depositionData[i].toFixed(2)}</td>
        <td>${heightData[i].toFixed(2)}</td>
        </tr>`;
    }
}

// -------------------- RESET --------------------
function resetSim(){

    animationRunning=false;

    year=0;
    labels=[];
    erosionData=[];
    depositionData=[];
    heightData=[];

    if(chart){
        chart.destroy();
        chart=null;
    }

    document.getElementById("tableBody").innerHTML="";

    updateTerrain();
}

// -------------------- START --------------------
updateLabels();
updateTerrain();

</script>

</body>
</html>
