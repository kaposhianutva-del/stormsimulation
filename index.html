<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Erosion & Deposition Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }
header { background:#2c3e50; color:white; padding:1rem; text-align:center; }
.container { display:flex; flex-wrap:wrap; padding:10px; }
.panel { flex:1; min-width:300px; background:white; margin:10px; padding:12px; border-radius:8px; }
canvas { border:1px solid #ccc; background:#cfefff; }
button { width:100%; padding:10px; margin-top:10px; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
td, th { border:1px solid #ccc; padding:5px; text-align:center; }
.control-group { margin-bottom:12px; }
</style>
</head>

<body>

<header>
<h2>🌊 Erosion & Deposition Simulator</h2>
</header>

<div class="container">

<div class="panel">
<h3>Controls</h3>

<div class="control-group">
<label>Slope: <span id="slopeVal">2.5%</span></label>
<input type="range" id="slope" min="0" max="5" step="0.1" value="2.5"
oninput="updateTerrain(); updateLabels();">
</div>

<div class="control-group">
<label>Water Flow: <span id="waterVal">50%</span></label>
<input type="range" id="water" min="0" max="100" value="50"
oninput="updateLabels()">
</div>

<div class="control-group">
<label>Vegetation: <span id="vegVal">40%</span></label>
<input type="range" id="veg" min="0" max="100" value="40"
oninput="updateTerrain(); updateLabels()">
</div>

<label>Ground Type</label>
<select id="ground" onchange="updateTerrain()">
<option value="sand">Sand</option>
<option value="soil" selected>Soil</option>
<option value="rock">Rock</option>
</select>

<button onclick="runStorm()">🌧 Run Storm</button>
<button onclick="resetSim()">🔄 Reset</button>

</div>

<div class="panel">
<h3>Landscape</h3>
<canvas id="land" width="500" height="250"></canvas>
</div>

<div class="panel">
<h3>Graph</h3>
<canvas id="chart"></canvas>
</div>

<div class="panel">
<h3>Data Table</h3>
<table>
<thead>
<tr>
<th>Year</th>
<th>Erosion</th>
<th>Deposition</th>
<th>Avg Height</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>

// --------------------
// STATE
// --------------------
let land = [];
let flowMap = [];
const W = 60;
let year = 0;

let labels = [];
let erosionData = [];
let depositionData = [];
let heightData = [];

let chart;
let animationRunning = false;

// --------------------
// INIT LAND
// --------------------
function initLand() {
    land = [];
    flowMap = new Array(W).fill(0);

    const slope = document.getElementById("slope").value / 100;
    let base = 180;

    for (let i = 0; i < W; i++) {
        land.push(base - i * slope * 80);
    }
}

// --------------------
// LABELS
// --------------------
function updateLabels() {
    slopeVal.innerText = slope.value + "%";
    waterVal.innerText = water.value + "%";
    vegVal.innerText = veg.value + "%";
}

// --------------------
// DRAW LAND
// --------------------
function drawLand(waterParticles = []) {

    const c = document.getElementById("land");
    const ctx = c.getContext("2d");

    ctx.clearRect(0,0,c.width,c.height);

    const ground = document.getElementById("ground").value;
    let color = ground==="sand"?"#d8c27a":ground==="rock"?"#666":"#8B5A2B";

    ctx.beginPath();
    ctx.moveTo(0,c.height);

    for(let i=0;i<W;i++){
        ctx.lineTo(i*(c.width/W), c.height-land[i]);
    }

    ctx.lineTo(c.width,c.height);
    ctx.fillStyle=color;
    ctx.fill();

    // river channel (memory)
    for(let i=0;i<W;i++){
        if(flowMap[i] > 1){
            ctx.fillStyle = "rgba(0,100,255,0.3)";
            ctx.fillRect(i*(c.width/W), c.height-land[i]-2, 6, 4);
        }
    }

    // water animation
    ctx.fillStyle="rgba(0,120,255,0.6)";
    waterParticles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,3,0,Math.PI*2);
        ctx.fill();
    });

    // vegetation (static)
    const veg = document.getElementById("veg").value/100;

    if(!window.vegMap){
        window.vegMap=[];
        for(let i=0;i<W;i++){
            window.vegMap[i]=[];
            for(let j=0;j<veg*6;j++){
                window.vegMap[i].push({offset:Math.random()});
            }
        }
    }

    for(let i=0;i<W;i++){
        window.vegMap[i].forEach(p=>{
            ctx.fillStyle="green";
            ctx.fillRect(i*(c.width/W), c.height-land[i]-p.offset*10,2,2);
        });
    }
}

// --------------------
// UPDATE TERRAIN
// --------------------
function updateTerrain(){
    window.vegMap=null;
    initLand();
    drawLand();
}

// --------------------
// WATER FLOW
// --------------------
function animateWater(callback){

    let particles=[];

    for(let i=0;i<40;i++){
        particles.push({x:Math.random()*500,y:30});
    }

    let frames=0;

    function step(){

        if(!animationRunning) return;

        frames++;

        const slope = document.getElementById("slope").value/100;

        particles.forEach(p=>{

            p.x += 2 + slope*5;

            let idx=Math.floor((p.x/500)*W);
            if(idx>=W) idx=W-1;

            let target=250-land[idx];
            p.y += (target-p.y)*0.3;

            flowMap[idx] += 0.5;
        });

        drawLand(particles);

        if(frames<60){
            requestAnimationFrame(step);
        } else {

            for(let i=0;i<W;i++){
                flowMap[i] *= 0.9;
            }

            callback();
        }
    }

    step();
}

// --------------------
// EROSION
// --------------------
function simulateErosion(){

    let erosion=0;
    let deposition=0;

    const water = document.getElementById("water").value/100;
    const veg = document.getElementById("veg").value/100;
    const ground = document.getElementById("ground").value;

    let groundFactor = ground==="sand"?1.8:ground==="rock"?0.4:1;

    let factor = water * (1-veg) * groundFactor * 0.15;

    let newLand=[...land];

    for(let i=1;i<W;i++){

        let diff = land[i-1] - land[i];

        if(diff > 0){

            let flowBoost = 1 + flowMap[i]*0.05;

            let slopeErosion = diff * factor * flowBoost;
            let sheetErosion = 0.01 * water * (1 - veg);

            let move = slopeErosion + sheetErosion;

            newLand[i-1] -= move;
            newLand[i] += move * 0.7;

            erosion += move;
            deposition += move * 0.7;
        }
    }

    land=newLand;

    return {erosion,deposition};
}

// --------------------
// RUN STORM
// --------------------
function runStorm(){

    if(animationRunning) return;

    animationRunning = true;

    animateWater(()=>{

        const result=simulateErosion();

        year++;

        let avg = land.reduce((a,b)=>a+b,0)/W;

        labels.push("Y"+year);
        erosionData.push(result.erosion);
        depositionData.push(result.deposition);
        heightData.push(avg);

        updateChart();
        updateTable();
        drawLand();

        animationRunning = false;
    });
}

// --------------------
// GRAPH
// --------------------
function updateChart(){

    if(!chart){
        chart=new Chart(document.getElementById("chart"),{
            type:"line",
            data:{
                labels,
                datasets:[
                    {label:"Erosion",data:erosionData},
                    {label:"Deposition",data:depositionData},
                    {label:"Avg Height",data:heightData}
                ]
            }
        });
    } else {
        chart.update();
    }
}

// --------------------
// TABLE
// --------------------
function updateTable(){

    const tbody=document.getElementById("tableBody");
    tbody.innerHTML="";

    for(let i=0;i<labels.length;i++){
        tbody.innerHTML+=`
        <tr>
        <td>${labels[i]}</td>
        <td>${erosionData[i].toFixed(2)}</td>
        <td>${depositionData[i].toFixed(2)}</td>
        <td>${heightData[i].toFixed(2)}</td>
        </tr>`;
    }
}

// --------------------
// RESET
// --------------------
function resetSim(){

    animationRunning = false;

    year=0;
    labels=[];
    erosionData=[];
    depositionData=[];
    heightData=[];

    if(chart){
        chart.destroy();
        chart = null;
    }

    document.getElementById("tableBody").innerHTML="";

    updateTerrain();
}

// INIT
updateLabels();
updateTerrain();

</script>

</body>
</html>
