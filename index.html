<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Erosion Simulator (Stable)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }
header { background:#2c3e50; color:white; padding:1rem; text-align:center; }

.container { display:flex; flex-wrap:wrap; padding:10px; }
.panel { flex:1; min-width:300px; background:white; margin:10px; padding:12px; border-radius:8px; }

canvas { border:1px solid #ccc; background:#cfefff; }

button { width:100%; padding:10px; margin-top:10px; }

table { width:100%; border-collapse:collapse; margin-top:10px; }
td, th { border:1px solid #ccc; padding:5px; text-align:center; }

.control-group { margin-bottom:10px; }
</style>
</head>

<body>

<header>
<h2>🌊 Erosion & Deposition Simulator</h2>
</header>

<div class="container">

<div class="panel">
<h3>Controls</h3>

<label>Slope: <span id="slopeVal">2.5%</span></label>
<input type="range" id="slope" min="0" max="5" step="0.1" value="2.5">

<label>Water Flow: <span id="waterVal">50%</span></label>
<input type="range" id="water" min="0" max="100" value="50">

<label>Vegetation: <span id="vegVal">40%</span></label>
<input type="range" id="veg" min="0" max="100" value="40">

<label>Ground Type</label>
<select id="ground">
<option value="sand">Sand</option>
<option value="soil" selected>Soil</option>
<option value="rock">Rock</option>
</select>

<button onclick="runStorm()">🌧 Run Storm</button>
<button onclick="resetSim()">🔄 Reset</button>
</div>

<div class="panel">
<h3>Landscape</h3>
<canvas id="land" width="500" height="250"></canvas>
</div>

<div class="panel">
<h3>Graph</h3>
<canvas id="chart"></canvas>
</div>

<div class="panel">
<h3>Data Table</h3>
<table>
<thead>
<tr>
<th>Year</th>
<th>Erosion</th>
<th>Deposition</th>
<th>Avg Height</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>

// -------------------- STATE --------------------
const W = 60;

let land = [];
let sediment = [];
let flowMap = [];

let year = 0;

let labels = [];
let erosionData = [];
let depositionData = [];
let heightData = [];

let chart = null;
let running = false;

// -------------------- SAFE INPUTS --------------------
function getInputs() {
    return {
        slope: Number(document.getElementById("slope").value) / 100,
        water: Number(document.getElementById("water").value) / 100,
        veg: Number(document.getElementById("veg").value) / 100,
        ground: document.getElementById("ground").value
    };
}

// -------------------- INIT --------------------
function init() {

    land = [];
    sediment = [];
    flowMap = new Array(W).fill(0);

    const { slope } = getInputs();
    let base = 180;

    for (let i = 0; i < W; i++) {
        land[i] = base - i * slope * 80;
        sediment[i] = 0;
    }
}

// -------------------- SAFE SLOPE --------------------
function slopeAt(i) {

    if (i <= 0 || i >= W - 1) return 0;

    let left = land[i - 1];
    let right = land[i + 1];

    if (!isFinite(left) || !isFinite(right)) return 0;

    return (left - right) / 2;
}

// -------------------- DRAW --------------------
function draw() {

    const c = document.getElementById("land");
    const ctx = c.getContext("2d");

    ctx.clearRect(0,0,c.width,c.height);

    const colors = {
        sand:"#d8c27a",
        soil:"#8B5A2B",
        rock:"#666"
    };

    const { ground } = getInputs();

    ctx.beginPath();
    ctx.moveTo(0,c.height);

    for (let i = 0; i < W; i++) {
        ctx.lineTo(i*(c.width/W), c.height - land[i]);
    }

    ctx.lineTo(c.width,c.height);
    ctx.fillStyle = colors[ground];
    ctx.fill();

    ctx.fillStyle = "rgba(0,80,200,0.4)";
    for (let i = 0; i < W; i++) {
        if (sediment[i] > 1) {
            ctx.fillRect(i*(c.width/W), c.height - land[i], 4, 4);
        }
    }
}

// -------------------- EROSION --------------------
function stepErosion() {

    let { water, veg, ground } = getInputs();

    let factor =
        ground === "sand" ? 1.7 :
        ground === "rock" ? 0.25 : 1;

    let newLand = [...land];
    let newSed = [...sediment];

    let erosion = 0;
    let deposition = 0;

    for (let i = 1; i < W; i++) {

        let s = slopeAt(i);

        let move =
            (Math.abs(s) * water * factor * 0.08) +
            (0.015 * water * (1 - veg));

        move = Math.min(move, 0.6);

        if (!isFinite(move)) move = 0;

        newLand[i - 1] -= move;
        newLand[i] += move * 0.7;

        newSed[i - 1] -= move;
        newSed[i] += move * 0.7;

        erosion += move;
        deposition += move * 0.5;
    }

    land = newLand;
    sediment = newSed;

    // smoothing
    smooth();

    return { erosion, deposition };
}

// -------------------- SMOOTH --------------------
function smooth() {

    let out = [...land];

    for (let i = 1; i < W - 1; i++) {
        let avg = (land[i - 1] + land[i] + land[i + 1]) / 3;
        out[i] = land[i] * 0.8 + avg * 0.2;
    }

    land = out.map(v => isFinite(v) ? v : 180);
}

// -------------------- RUN --------------------
function runStorm() {

    if (running) return;
    running = true;

    let result = stepErosion();

    year++;

    let safe = land.filter(v => isFinite(v));
    let avg = safe.length ? safe.reduce((a,b)=>a+b,0)/safe.length : 180;

    labels.push("Y"+year);
    erosionData.push(result.erosion);
    depositionData.push(result.deposition);
    heightData.push(avg);

    updateChart();
    updateTable();
    draw();

    running = false;
}

// -------------------- CHART --------------------
function updateChart() {

    if (!chart) {
        chart = new Chart(document.getElementById("chart"), {
            type:"line",
            data:{
                labels,
                datasets:[
                    {label:"Erosion", data: erosionData},
                    {label:"Deposition", data: depositionData},
                    {label:"Avg Height", data: heightData}
                ]
            }
        });
    } else chart.update();
}

// -------------------- TABLE --------------------
function updateTable() {

    let t = document.getElementById("tableBody");
    t.innerHTML = "";

    for (let i = 0; i < labels.length; i++) {
        t.innerHTML += `
        <tr>
        <td>${labels[i]}</td>
        <td>${erosionData[i].toFixed(2)}</td>
        <td>${depositionData[i].toFixed(2)}</td>
        <td>${heightData[i].toFixed(2)}</td>
        </tr>`;
    }
}

// -------------------- RESET --------------------
function resetSim() {

    year = 0;
    labels = [];
    erosionData = [];
    depositionData = [];
    heightData = [];

    if (chart) {
        chart.destroy();
        chart = null;
    }

    init();
    draw();
    updateTable();
}

// -------------------- INIT START --------------------
init();
draw();

</script>

</body>
</html>
